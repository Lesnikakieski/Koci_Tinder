{% extends "index.html" %}
{% block title %}Dodaj zadanie{% endblock %}
{% block content %}
<h2>Dodaj zadanie</h2>
<form method="POST">
    <input type="text" name="title" placeholder="Tytuł zadania" value="{{ title }}"/>
    <button type="submit">Zapisz</button>
</form>
{% if error %}
<h3 style="color:red;">{{error}}</h3>
{% endif %}
<p><a href="{{url_for('list')}}">Powrót</a></p>
{% endblock %}
